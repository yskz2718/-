<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>将棋（成り対応）</title>
<style>
  body { text-align: center; font-family: sans-serif; }
  table { border-collapse: collapse; margin: auto; }
  td {
    width: 50px;
    height: 50px;
    border: 1px solid black;
    font-size: 18px;
    cursor: pointer;
  }
  .selected { background: yellow; }
</style>
</head>
<body>

<h1>将棋（成りあり）</h1>
<p id="turn"></p>
<table id="board"></table>

<script>
const SIZE = 9;
let board = [];
let currentPlayer = "P";
let selected = null;

// 表示
const PIECES = {
  "K":"王","R":"飛","B":"角","G":"金","S":"銀","N":"桂","L":"香","P":"歩",
  "+R":"龍","+B":"馬","+S":"成銀","+N":"成桂","+L":"成香","+P":"と",
  "k":"玉","r":"飛","b":"角","g":"金","s":"銀","n":"桂","l":"香","p":"歩",
  "+r":"龍","+b":"馬","+s":"成銀","+n":"成桂","+l":"成香","+p":"と"
};

// 成り変換
function promote(piece){
  if(piece.startsWith("+")) return piece;
  if(["P","L","N","S","B","R","p","l","n","s","b","r"].includes(piece)){
    return "+" + piece;
  }
  return piece;
}

// 成り判定
function inPromotionZone(player, x){
  return player==="P" ? x <= 2 : x >= 6;
}

function initBoard() {
  board = Array.from({length: SIZE}, () => Array(SIZE).fill("."));

  board[0] = ["l","n","s","g","k","g","s","n","l"];
  board[1][1] = "r";
  board[1][7] = "b";
  for(let i=0;i<9;i++) board[2][i] = "p";

  board[8] = ["L","N","S","G","K","G","S","N","L"];
  board[7][7] = "R";
  board[7][1] = "B";
  for(let i=0;i<9;i++) board[6][i] = "P";
}

function drawBoard() {
  const table = document.getElementById("board");
  table.innerHTML = "";

  for(let i=0;i<SIZE;i++){
    let tr = document.createElement("tr");
    for(let j=0;j<SIZE;j++){
      let td = document.createElement("td");
      let piece = board[i][j];
      td.textContent = piece==="." ? "" : PIECES[piece];
      td.onclick = ()=>handleClick(i,j);

      if(selected && selected[0]===i && selected[1]===j){
        td.classList.add("selected");
      }

      tr.appendChild(td);
    }
    table.appendChild(tr);
  }

  document.getElementById("turn").textContent =
    currentPlayer==="P" ? "先手の番" : "後手の番";
}

function isEnemy(p1, p2){
  if(p2 === ".") return false;
  return (p1.replace("+","").toUpperCase() === p1.replace("+","")) !==
         (p2.replace("+","").toUpperCase() === p2.replace("+",""));
}

function pathClear(sx,sy,tx,ty){
  let dx = Math.sign(tx-sx);
  let dy = Math.sign(ty-sy);
  let x = sx+dx, y = sy+dy;

  while(x !== tx || y !== ty){
    if(board[x][y] !== ".") return false;
    x += dx;
    y += dy;
  }
  return true;
}

function isValidMove(piece, sx, sy, tx, ty){
  const dx = tx - sx;
  const dy = ty - sy;
  const absX = Math.abs(dx);
  const absY = Math.abs(dy);

  const base = piece.replace("+","");
  const forward = (base === base.toUpperCase()) ? -1 : 1;

  // 成り駒（金と同じ動き）
  if(piece.startsWith("+") && base !== "B" && base !== "R"){
    return (
      (dx===forward && Math.abs(dy)<=1) ||
      (dx===0 && absY===1) ||
      (dx===-forward && dy===0)
    );
  }

  // 王
  if(base==="K"){
    return absX<=1 && absY<=1;
  }

  // 金
  if(base==="G"){
    return (
      (dx===forward && Math.abs(dy)<=1) ||
      (dx===0 && absY===1) ||
      (dx===-forward && dy===0)
    );
  }

  // 銀
  if(base==="S"){
    return (
      (dx===forward && Math.abs(dy)<=1) ||
      (dx===-forward && absY===1)
    );
  }

  // 桂
  if(base==="N"){
    return dx===2*forward && absY===1;
  }

  // 香
  if(base==="L"){
    return dy===0 && dx*forward > 0 && pathClear(sx,sy,tx,ty);
  }

  // 歩
  if(base==="P"){
    return dx===forward && dy===0;
  }

  // 飛（成り含む）
  if(base==="R"){
    if((dx===0 || dy===0) && pathClear(sx,sy,tx,ty)) return true;
    if(piece.startsWith("+")) return absX===1 && absY===1;
  }

  // 角（成り含む）
  if(base==="B"){
    if(absX===absY && pathClear(sx,sy,tx,ty)) return true;
    if(piece.startsWith("+")) return (absX===1 && dy===0) || (absY===1 && dx===0);
  }

  return false;
}

function handleClick(x,y){
  let piece = board[x][y];

  if(!selected){
    if(piece === ".") return;

    if(currentPlayer==="P" && piece.replace("+","")===piece.replace("+","").toLowerCase()) return;
    if(currentPlayer==="p" && piece.replace("+","")===piece.replace("+","").toUpperCase()) return;

    selected = [x,y];
  } else {
    let [sx,sy] = selected;
    let moving = board[sx][sy];

    if(isValidMove(moving,sx,sy,x,y)){
      if(board[x][y]==="." || isEnemy(moving, board[x][y])){

        // 成りチェック
        let newPiece = moving;
        if(inPromotionZone(currentPlayer, x) || inPromotionZone(currentPlayer, sx)){
          if(confirm("成りますか？")){
            newPiece = promote(moving);
          }
        }

        board[x][y] = newPiece;
        board[sx][sy] = ".";
        currentPlayer = currentPlayer==="P" ? "p" : "P";
      }
    }

    selected = null;
  }

  drawBoard();
}

initBoard();
drawBoard();
</script>

</body>
</html>
